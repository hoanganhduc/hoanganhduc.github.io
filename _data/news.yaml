  text: "Mariana Teatini Ribeiro and <a href='http://homepages.dcc.ufmg.br/%7eviniciussantos/'>Vinícius Fernandes dos Santos</a> inform us about a flaw in Proposition 6 of our paper \"Sliding Tokens on Block Graphs\". See <a href='/events/WALCOM2017/note.pdf'>this note</a> for more detail."
