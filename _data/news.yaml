  text: "I visit <a href='https://www.kyoto-u.ac.jp/'>Kyoto University</a> (Kyoto, Japan). Host: <a href='http://www.lab2.kuis.kyoto-u.ac.jp/minato'>Shin-ichi MINATO</a>."
- time: "April 01, 2021"
  text: "I start working as a <i>Research Assistant</i> at <a href='http://www.kyutech.ac.jp/'>Kyutech</a> (Iizuka Campus, Fukuoka, Japan) under the direction of <a href='http://algorithm.ces.kyutech.ac.jp/wp/members/saitoh/'>Toshiki SAITOH</a>."
- time: "December 23 - 25, 2019"
  text: "I visit <a href='https://www.kumamoto-u.ac.jp/'>Kumamoto University</a> (Kumamoto, Japan). Host: <a href='http://www.cs.kumamoto-u.ac.jp/~otachi/'>Yota OTACHI</a>."
- time: "October 29, 2019"
  text: "A manuscript entitled \"Reconfiguring $k$-Path Vertex Covers\" has been accepted to <a href='https://www.comp.nus.edu.sg/~walcom20/'>WALCOM 2020</a> (joint work with Akira Suzuki and Tsuyoshi Yagita)."
- time: "September 02, 2019"
  text: "From August 30, 2019 to March 31, 2021, my research will be supported by a JSPS KAKENHI <a href='https://www.jsps.go.jp/english/e-grants/grants09_fy2019_startup.html'>Grant-in-Aid for Research Activity start-up (FY2019)</a> project entitled \"A study on reconfiguration problems under Token Sliding and their applications\" (My Role: PI, Grant Number <a href='https://kaken.nii.ac.jp/grant/KAKENHI-PROJECT-19K24349/'>19K24349</a>)."
- time: "April 01, 2019"
  text: "I move to <a href='http://www.kyutech.ac.jp/'>Kyutech</a> (Iizuka Campus, Fukuoka, Japan) and start working as a <i>Postdoctoral Researcher</i> under the direction of <a href='http://algorithm.ces.kyutech.ac.jp/wp/members/saitoh/'>Toshiki SAITOH</a>."
- time: "February 10, 2019"
  text: "I create <a href='http://reconf.wikidot.com/'>reconf.wikidot.com</a> for listing some publications related to <a href='http://www.ecei.tohoku.ac.jp/alg/core/'>Combinatorial Reconfiguration</a> and some other information. An old version of this page at <a href='http://www.jaist.ac.jp/~s1520016/combinatorial-reconfiguration/'>www.jaist.ac.jp/~s1520016/combinatorial-reconfiguration</a> has been deleted, but one can find its captures saved at <a href='https://web.archive.org/web/20171023070608/http://www.jaist.ac.jp/~s1520016/combinatorial-reconfiguration'>Internet Archive</a>."
- time: "December 21, 2018"
  text: "A manuscript entitled \"Shortest Reconfiguration Sequence for Sliding Tokens on Spiders\" has been accepted to <a href='http://easyconferences.eu/ciac2019/'>CIAC 2019</a> (joint work with Amanj Khorramian and Ryuhei Uehara)."
- time: "September 05, 2018"
  text: "I move to <a href='http://hus.vnu.edu.vn/'>VNU University of Science</a> (Hanoi, Vietnam) and started working as a <i>Lecturer</i> at the Department of Informatics, Faculty of Mathematics, Mechanics, and Informatics."
- time: "June 22, 2018"
  text: "I receive my PhD degree along with the JAIST <a href='http://www.jaist.ac.jp/english/education/degree/awards.html'>Outstanding Performance Award</a> for doctoral students."
- time: "May 07, 2018"
  text: "I complete my PhD final defense at JAIST. See <a href='/events/'>this page</a> for a copy of the presentation slides or a compressed handout with unnecessary animation removed)."
