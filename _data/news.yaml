# Last Updated: 2022-04-29
- time: "March 25, 2022"
  text: "A manuscript entitled \"Reconfiguring $k$-Path Vertex Covers\" has been accepted to <a href='https://www.jstage.jst.go.jp/browse/transinf/'>IEICE Transactions on Information and Systems</a> (joint work with Akira Suzuki and Tsuyoshi Yagita)."
  present: 1
