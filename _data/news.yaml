  text: "I move to <a href='https://www.kyoto-u.ac.jp/'>Kyoto University</a> (Kyoto, Japan) and started working as a <i>Postdoctoral Researcher</i> under the direction of <a href='http://www.lab2.kuis.kyoto-u.ac.jp/minato'>Shin-ichi MINATO</a>, in the <a href='https://afsa.jp/en/member/#b01'>B01 Group</a> of the <a href='https://afsa.jp/'>AFSA</a> Project (supported by KAKENHI Grant Number <a href='https://kaken.nii.ac.jp/en/grant/KAKENHI-PLANNED-20H05964/'>20H05964</a>)."
  present: 1
